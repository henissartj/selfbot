<!DOCTYPE html>
<html>
<head>
    <title>Selfbot Dashboard</title>
    <meta http-equiv="refresh" content="10">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2b2d31;
            color: #dcddde;
            text-align: center;
            padding-top: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #313338;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-weight: bold;
            margin: 10px 0;
        }
        .online { background-color: #23a559; color: white; }
        .offline { background-color: #da373c; color: white; }
        .btn-logout {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #da373c;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .btn-logout:hover { background-color: #a1282c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tableau de Bord</h1>
        <div class="user-info">
            Connecté en tant que : <strong>{{ user }}</strong>
        </div>
        
        <div class="status-section">
            <span class="status-badge {% if 'Online' in status %}online{% else %}offline{% endif %}">
                {{ status }}
            </span>
        </div>

        <p>Votre bot est actif. Vous pouvez utiliser les commandes depuis Discord.</p>
        
        <a href="/logout" class="btn-logout">Arrêter et Déconnecter</a>
    </div>
</body>
</html>
