<!DOCTYPE html>
<html>
<head>
    <title>Selfbot Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #2d2d2d; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 400px; text-align: center; }
        input[type="text"] { width: 100%; padding: 12px; margin: 20px 0; background: #3d3d3d; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #5865F2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background 0.3s; }
        button:hover { background: #4752C4; }
        h1 { margin-top: 0; color: #5865F2; }
        p { color: #aaa; font-size: 0.9em; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Selfbot Login</h1>
        <p>Entrez votre token Discord pour démarrer votre session.</p>
        <form method="POST">
            <input type="text" name="token" placeholder="Votre Token Discord" required autocomplete="off">
            <button type="submit">Lancer le Bot</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.8em; color: #777;">Vos tokens ne sont pas stockés de manière permanente.</p>
    </div>
</body>
</html>
